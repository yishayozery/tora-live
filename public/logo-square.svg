<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="TORA_LIVE — שיעורי תורה אונליין">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A53D"/>
      <stop offset="100%" stop-color="#B8862F"/>
    </linearGradient>
    <radialGradient id="liveGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: square with rounded corners -->
  <rect x="0" y="0" width="500" height="500" rx="80" fill="url(#bg)"/>

  <!-- Decorative top stars -->
  <circle cx="100" cy="80" r="3" fill="#F4E5C2" opacity="0.5"/>
  <circle cx="400" cy="80" r="3" fill="#F4E5C2" opacity="0.5"/>
  <circle cx="250" cy="50" r="2" fill="#F4E5C2" opacity="0.4"/>

  <!-- Open book icon (centered, slightly up) -->
  <g transform="translate(250, 220)">
    <!-- Book cover -->
    <rect x="-110" y="-70" width="220" height="140" rx="8" fill="url(#goldGrad)"/>
    <!-- Book spine highlight -->
    <rect x="-110" y="-70" width="6" height="140" fill="#E8C56C" opacity="0.4"/>
    <rect x="104" y="-70" width="6" height="140" fill="#8B6420" opacity="0.4"/>

    <!-- Pages (cream) -->
    <rect x="-95" y="-58" width="190" height="116" rx="2" fill="#FAF6E8"/>

    <!-- Center crease -->
    <line x1="0" y1="-58" x2="0" y2="58" stroke="#1E40AF" stroke-width="0.8" opacity="0.3"/>

    <!-- Text lines on left page -->
    <line x1="-80" y1="-40" x2="-15" y2="-40" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="-80" y1="-25" x2="-20" y2="-25" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="-80" y1="-10" x2="-15" y2="-10" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="-80" y1="5"   x2="-25" y2="5"   stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="-80" y1="20"  x2="-15" y2="20"  stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="-80" y1="35"  x2="-30" y2="35"  stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

    <!-- Text lines on right page -->
    <line x1="15" y1="-40" x2="80" y2="-40" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="20" y1="-25" x2="80" y2="-25" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="15" y1="-10" x2="80" y2="-10" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="25" y1="5"   x2="80" y2="5"   stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="15" y1="20"  x2="80" y2="20"  stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="30" y1="35"  x2="80" y2="35"  stroke="#1E40AF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

    <!-- LIVE indicator (top-right) — pulsing green dot with glow -->
    <circle cx="100" cy="-65" r="22" fill="url(#liveGlow)"/>
    <circle cx="100" cy="-65" r="9" fill="#10B981"/>
    <circle cx="100" cy="-65" r="4" fill="#FFFFFF"/>
  </g>

  <!-- Brand text "TORA_LIVE" (bottom) -->
  <text x="250" y="380" font-family="Georgia, 'Frank Ruhl Libre', serif" font-size="58" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">TORA_LIVE</text>

  <!-- Subtitle in Hebrew -->
  <text x="250" y="425" font-family="Arial, 'Heebo', sans-serif" font-size="22" fill="#F4E5C2" text-anchor="middle" opacity="0.85" direction="rtl">שיעורי תורה אונליין</text>

  <!-- Decorative gold underline -->
  <rect x="190" y="445" width="120" height="3" rx="1.5" fill="url(#goldGrad)"/>
</svg>
