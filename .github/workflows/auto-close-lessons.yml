name: auto-close-lessons

# סוגר אוטומטית שיעורי שידור שנשארו תקועים (רב לא לחץ "סיים").
# רץ כל שעה — קל מאוד (1 שאילתת DB + עדכונים בודדים).

on:
  schedule:
    # כל שעה עגולה
    - cron: '0 * * * *'
  workflow_dispatch: {}

concurrency:
  group: auto-close-lessons
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/auto-close-lessons
        env:
          URL: ${{ secrets.TORA_LIVE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::error::TORA_LIVE_URL או CRON_SECRET חסרים"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            -H "Accept: application/json" \
            --max-time 60 \
            "$URL/api/cron/auto-close-lessons")
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::auto-close failed with status $status"
            exit 1
          fi
