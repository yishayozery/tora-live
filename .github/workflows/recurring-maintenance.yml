name: recurring-lessons-maintenance

# פעם ביום ב-06:00 UTC (=09:00 ישראל בקיץ, 08:00 בחורף)
# מאריך תבניות שיעור קבוע + שולח התראות חגים שבועיות

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

concurrency:
  group: recurring-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/recurring-maintenance
        env:
          URL: ${{ secrets.TORA_LIVE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::error::TORA_LIVE_URL או CRON_SECRET חסרים ב-GitHub Secrets"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            --max-time 60 \
            "$URL/api/cron/recurring-maintenance")
          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::recurring-maintenance failed with status $status"
            exit 1
          fi
