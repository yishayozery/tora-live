name: detect-live-broadcasts

# זיהוי מהיר של שידורים חיים — רץ כל 15 דקות בשעות פעילות (17:00-23:00 UTC+2 = 14:00-20:00 UTC).
# המטרה: לזהות תוך דקות שרב התחיל/סיים שידור חי ב-YouTube ולעדכן אצלנו.
# Vercel Hobby cron = יומי בלבד, לכן משתמשים כאן ב-GitHub Actions (חינם 2,000 דק'/חודש — מספיק בקלות).
#
# דרישות:
#   1. ב-Settings → Secrets and variables → Actions להוסיף:
#      - TORA_LIVE_URL           = https://torah-live-rho.vercel.app  (או הדומיין המותאם)
#      - CRON_SECRET             = ערך מ-Vercel env (זהה לזה ש-`/api/cron/*` דורש)
#   2. Default: 05:00-21:00 Israel (= 03:00-19:00 UTC קיץ / 02:00-18:00 חורף).
#      אם צריך יותר — לערוך את ה-cron schedule למטה.

on:
  schedule:
    # כל 30 דק' בין 02:00-20:00 UTC (מכסה שעות פעילות בישראל כל השנה)
    # הקטנה מ-15 דק' כדי להישאר בתוך quota של YouTube Data API
    - cron: '*/30 2-20 * * *'
  workflow_dispatch: {}  # מאפשר הרצה ידנית מה-UI של GitHub

concurrency:
  group: detect-live
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/detect-live
        env:
          URL: ${{ secrets.TORA_LIVE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::error::TORA_LIVE_URL או CRON_SECRET חסרים ב-GitHub Secrets"
            exit 1
          fi

          echo "→ POST $URL/api/cron/detect-live"
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            -H "Accept: application/json" \
            --max-time 60 \
            "$URL/api/cron/detect-live")

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)

          echo "HTTP $status"
          echo "$body"

          if [ "$status" != "200" ]; then
            echo "::error::detect-live failed with status $status"
            exit 1
          fi
